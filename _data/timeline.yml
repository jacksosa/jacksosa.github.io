- title: Software Engineer, DWP Digital, Remote
  from: 2025
  to: Present (12-month contract)
  description: >-
    Currently engaged on a 12-month contract with DWP Digital, modernising the New Style Jobseeker's Allowance (JSA)
    platform and delivering a resilient, event-driven digital service that manages the full claimant journey — from
    initial application and eligibility assessment through to ongoing bi-monthly payments. The system is built on a
